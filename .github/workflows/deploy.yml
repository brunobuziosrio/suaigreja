name: Deploy producao VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy via webhook
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://suaigreja.top/deploy-hook \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}")
          echo "status=$status"
          test "$status" = "202"
